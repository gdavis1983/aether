<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Solid Black Background with Rounded Corners (iPhone App Icon Style) -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="#000000" />

  <!-- Exact Aether CPU Logo in White -->
  <g stroke="#FFFFFF" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Main CPU body -->
    <rect x="27.5" y="27.5" width="45" height="45" rx="6" ry="6" />
    <!-- Inner core -->
    <rect x="40" y="40" width="20" height="20" />
    <!-- Top pins -->
    <line x1="40.5" y1="15" x2="40.5" y2="27.5" />
    <line x1="50" y1="15" x2="50" y2="27.5" />
    <line x1="59.5" y1="15" x2="59.5" y2="27.5" />
    <!-- Bottom pins -->
    <line x1="40.5" y1="72.5" x2="40.5" y2="85" />
    <line x1="50" y1="72.5" x2="50" y2="85" />
    <line x1="59.5" y1="72.5" x2="59.5" y2="85" />
    <!-- Left pins -->
    <line x1="15" y1="40.5" x2="27.5" y2="40.5" />
    <line x1="15" y1="50" x2="27.5" y2="50" />
    <line x1="15" y1="59.5" x2="27.5" y2="59.5" />
    <!-- Right pins -->
    <line x1="72.5" y1="40.5" x2="85" y2="40.5" />
    <line x1="72.5" y1="50" x2="85" y2="50" />
    <line x1="72.5" y1="59.5" x2="85" y2="59.5" />
  </g>
</svg>